<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotoğraflar | Bizim Hikayemiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body class="sub-page">
  <div id="accessGate" class="access-gate" aria-hidden="false">
    <div class="access-card">
      <p class="access-eyebrow">Özel Giriş</p>
      <h2>Bu anı kutusu sadece Duygu için</h2>
      <p class="access-text">Devam etmek için şifreyi gir.</p>
      <form id="accessForm" class="access-form">
        <input id="accessInput" type="password" autocomplete="off" placeholder="Şifre" required />
        <button type="submit" class="btn btn-primary">Aç</button>
      </form>
      <p id="accessError" class="access-error hidden">Şifre yanlış. Tekrar dene.</p>
    </div>
  </div>

  <div id="appRoot" class="app-root is-hidden" aria-hidden="true">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <header class="hero container reveal">
      <nav class="top-nav">
        <a class="btn btn-ghost" href="index.html">Ana Sayfa</a>
        <a class="btn btn-ghost" href="timeline.html">Zaman Tüneli</a>
        <a class="btn btn-ghost" href="map.html">Anı Haritası</a>
        <a class="btn btn-primary" href="photos.html">Fotoğraflar</a>
        <a class="btn btn-ghost" href="videos.html">Epik Videolarımız</a>
      </nav>
      <p class="eyebrow">Anı Albümü</p>
      <h1>Fotoğraf Defteri</h1>
      <p class="hero-text">En güzel kareleri tek yerde keşfet.</p>
    </header>

    <main class="container">
      <section id="gallery" class="section reveal">
        <div id="galleryGrid" class="gallery-grid"></div>
      </section>
    </main>

    <div id="lightbox" class="lightbox hidden" aria-hidden="true">
      <button id="lightboxClose" class="lightbox-close" aria-label="Kapat">x</button>
      <img id="lightboxImage" src="" alt="" />
      <p id="lightboxCaption"></p>
    </div>
  </div>

  <script src="script.js?v=20260417-5"></script>
</body>
</html>
